name: Release

# Trigger on version tags: v1.0.0, v1.2.3, etc.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build app and DMG
        run: VERSION_OVERRIDE="$VERSION" ./scripts/build-app.sh --dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClaudeBat v${{ env.VERSION }}
          body: |
            ## ClaudeBat v${{ env.VERSION }}

            Your Claude usage. One glance away.

            ### Install

            **Download:** Grab `ClaudeBat-${{ env.VERSION }}.dmg` below, open it, drag to Applications, then run:

            ```
            xattr -cr /Applications/ClaudeBat.app
            open /Applications/ClaudeBat.app
            ```

            **Homebrew:**
            ```
            brew install diamondkj/tap/claudebat
            ```

            If Homebrew installs it but Finder still blocks the first launch, run:

            ```
            xattr -cr /Applications/ClaudeBat.app
            open /Applications/ClaudeBat.app
            ```

            Requires macOS 14+ and Claude Code logged in.
          files: build/ClaudeBat-${{ env.VERSION }}.dmg
          draft: false
          prerelease: false
